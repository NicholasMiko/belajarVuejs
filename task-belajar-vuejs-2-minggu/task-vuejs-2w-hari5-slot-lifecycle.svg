<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="400" fill="#f8fafc"/>
  <text x="380" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#35495e">Hari 5 — Named Slot, Lifecycle &amp; Template Ref</text>

  <!-- modal with named slots -->
  <rect x="60" y="70" width="300" height="250" rx="12" fill="#ffffff" stroke="#8b5cf6" stroke-width="2.5"/>
  <text x="210" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#7c3aed">BaseModal.vue</text>

  <rect x="80" y="90" width="260" height="46" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-dasharray="5 3"/>
  <text x="210" y="110" text-anchor="middle" font-size="12" fill="#7c3aed" font-family="Consolas, monospace">&lt;slot name="header"&gt;</text>
  <text x="210" y="127" text-anchor="middle" font-size="11" fill="#35495e" font-weight="bold">Hapus Todo?</text>

  <rect x="80" y="146" width="260" height="90" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-dasharray="5 3"/>
  <text x="210" y="167" text-anchor="middle" font-size="12" fill="#7c3aed" font-family="Consolas, monospace">&lt;slot&gt; (body)</text>
  <text x="210" y="188" text-anchor="middle" font-size="11" fill="#64748b">"Belajar slot" akan dihapus permanen.</text>
  <rect x="100" y="200" width="220" height="26" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  <text x="112" y="217" font-size="10" fill="#3b82f6">| ← kursor auto-focus (template ref)</text>

  <rect x="80" y="246" width="260" height="56" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-dasharray="5 3"/>
  <text x="210" y="266" text-anchor="middle" font-size="12" fill="#7c3aed" font-family="Consolas, monospace">&lt;slot name="footer"&gt;</text>
  <rect x="110" y="272" width="90" height="24" rx="6" fill="#ef4444"/>
  <text x="155" y="288" text-anchor="middle" font-size="11" fill="#ffffff">Ya, hapus</text>
  <rect x="215" y="272" width="90" height="24" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="260" y="288" text-anchor="middle" font-size="11" fill="#64748b">Batal</text>

  <!-- lifecycle timeline -->
  <defs><marker id="a5" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#35495e"/></marker></defs>
  <text x="560" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#35495e">Lifecycle component</text>
  <line x1="560" y1="95" x2="560" y2="340" stroke="#94a3b8" stroke-width="2" marker-end="url(#a5)"/>

  <rect x="450" y="110" width="220" height="44" rx="8" fill="#ecfdf5" stroke="#42b883" stroke-width="2"/>
  <text x="560" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#047857">onMounted()</text>
  <text x="560" y="145" text-anchor="middle" font-size="10" fill="#047857">DOM siap → inputRef.value.focus()</text>

  <rect x="450" y="185" width="220" height="44" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="560" y="203" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">onUpdated()</text>
  <text x="560" y="220" text-anchor="middle" font-size="10" fill="#1d4ed8">reactive data berubah → DOM di-update</text>

  <rect x="450" y="260" width="220" height="44" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="560" y="278" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">onUnmounted()</text>
  <text x="560" y="295" text-anchor="middle" font-size="10" fill="#dc2626">bersih-bersih: hapus listener/timer</text>

  <text x="380" y="375" text-anchor="middle" font-size="12" fill="#64748b">Named slot membuat modal fleksibel — isi header/body/footer ditentukan pemakainya</text>
</svg>
