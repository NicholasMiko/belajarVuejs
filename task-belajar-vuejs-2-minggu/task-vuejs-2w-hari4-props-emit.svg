<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="430" fill="#f8fafc"/>
  <text x="380" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#35495e">Hari 4 — Props ↓ / Emit ↑ dan BaseButton</text>

  <defs>
    <marker id="a4g" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#42b883"/></marker>
    <marker id="a4o" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#f59e0b"/></marker>
  </defs>

  <rect x="240" y="55" width="200" height="60" rx="10" fill="#35495e"/>
  <text x="340" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">App.vue</text>
  <text x="340" y="100" text-anchor="middle" font-size="11" fill="#94f7cf">state: todos[] — satu-satunya pemilik data</text>

  <rect x="60" y="190" width="170" height="60" rx="10" fill="#ffffff" stroke="#42b883" stroke-width="2"/>
  <text x="145" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#35495e">TodoInput.vue</text>
  <text x="145" y="235" text-anchor="middle" font-size="10" fill="#64748b" font-family="Consolas, monospace">emit('add', teks)</text>

  <rect x="255" y="190" width="170" height="60" rx="10" fill="#ffffff" stroke="#42b883" stroke-width="2"/>
  <text x="340" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#35495e">TodoList.vue</text>
  <text x="340" y="235" text-anchor="middle" font-size="10" fill="#64748b" font-family="Consolas, monospace">defineProps({todos})</text>

  <rect x="255" y="310" width="170" height="60" rx="10" fill="#ffffff" stroke="#42b883" stroke-width="2"/>
  <text x="340" y="335" text-anchor="middle" font-size="13" font-weight="bold" fill="#35495e">TodoItem.vue</text>
  <text x="340" y="355" text-anchor="middle" font-size="10" fill="#64748b" font-family="Consolas, monospace">emit('toggle'/'delete')</text>

  <path d="M 300 115 L 175 185" stroke="#42b883" stroke-width="2" fill="none" marker-end="url(#a4g)"/>
  <path d="M 330 115 L 330 185" stroke="#42b883" stroke-width="2" fill="none" marker-end="url(#a4g)"/>
  <path d="M 330 250 L 330 305" stroke="#42b883" stroke-width="2" fill="none" marker-end="url(#a4g)"/>
  <path d="M 180 190 L 305 120" stroke="#f59e0b" stroke-width="2" fill="none" stroke-dasharray="6 4" marker-end="url(#a4o)"/>
  <path d="M 350 305 L 350 255" stroke="#f59e0b" stroke-width="2" fill="none" stroke-dasharray="6 4" marker-end="url(#a4o)"/>
  <path d="M 355 250 L 355 120" stroke="#f59e0b" stroke-width="2" fill="none" stroke-dasharray="6 4" marker-end="url(#a4o)"/>

  <text x="238" y="160" font-size="11" fill="#42b883" font-weight="bold">props ↓</text>
  <text x="382" y="290" font-size="11" fill="#f59e0b" font-weight="bold">emit ↑</text>
  <text x="95" y="290" font-size="10" fill="#dc2626">❌ child dilarang</text>
  <text x="95" y="304" font-size="10" fill="#dc2626">mengubah props</text>

  <!-- BaseButton -->
  <rect x="500" y="140" width="230" height="180" rx="10" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="615" y="168" text-anchor="middle" font-size="13" font-weight="bold" fill="#35495e">BaseButton.vue</text>
  <text x="615" y="188" text-anchor="middle" font-size="10" fill="#7c3aed" font-family="Consolas, monospace">props: { variant, disabled }</text>
  <rect x="530" y="205" width="170" height="34" rx="8" fill="#42b883"/>
  <text x="615" y="227" text-anchor="middle" font-size="12" fill="#ffffff">variant="primary"</text>
  <rect x="530" y="250" width="170" height="34" rx="8" fill="#ef4444"/>
  <text x="615" y="272" text-anchor="middle" font-size="12" fill="#ffffff">variant="danger"</text>
  <text x="615" y="305" text-anchor="middle" font-size="10" fill="#64748b">satu component, dipakai di seluruh app</text>

  <text x="380" y="412" text-anchor="middle" font-size="12" fill="#64748b">Validasi props: tipe salah → warning di console (buktikan!)</text>
</svg>
