  <path d="M 195 95 L 275 115" stroke="#35495e" stroke-width="2" fill="none" marker-end="url(#a8)"/>
  <path d="M 195 165 L 275 145" stroke="#35495e" stroke-width="2" fill="none" marker-end="url(#a8)"/>
  <path d="M 480 118 L 595 110" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#a8)"/>
