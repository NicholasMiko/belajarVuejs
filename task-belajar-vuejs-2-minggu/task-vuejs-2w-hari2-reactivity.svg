  <path d="M 660 126 L 605 180" stroke="#35495e" stroke-width="1.5" fill="none" marker-end="url(#a2)"/>
  <path d="M 470 126 L 470 310 L 505 310" stroke="#fbbf24" stroke-width="1.5" fill="none" stroke-dasharray="5 3" marker-end="url(#a2)"/>
