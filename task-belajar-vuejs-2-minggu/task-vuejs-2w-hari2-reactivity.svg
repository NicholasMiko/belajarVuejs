  <!-- flow -->
  <defs><marker id="a2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#35495e"/></marker></defs>
  <rect x="430" y="80" width="140" height="46" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  <text x="500" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#35495e">ref: harga</text>
  <text x="500" y="117" text-anchor="middle" font-size="10" fill="#64748b">v-model.number</text>
  <rect x="590" y="80" width="140" height="46" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
