<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="430" fill="#f8fafc"/>
  <text x="380" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#35495e">Hari 9 — Pinia: User Store + Auth Store</text>

  <defs>
    <marker id="a9y" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#f59e0b"/></marker>
    <marker id="a9" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#35495e"/></marker>
  </defs>

  <!-- user store -->
  <rect x="70" y="120" width="220" height="140" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="180" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">🍍 useUserStore</text>
  <line x1="90" y1="160" x2="270" y2="160" stroke="#fbbf24"/>
  <text x="90" y="183" font-size="11" fill="#35495e" font-family="Consolas, monospace">state:   users[]</text>
  <text x="90" y="207" font-size="11" fill="#35495e" font-family="Consolas, monospace">getters: totalUser</text>
  <text x="90" y="231" font-size="11" fill="#35495e" font-family="Consolas, monospace">actions: fetchUsers()</text>

  <!-- auth store -->
  <rect x="470" y="120" width="220" height="140" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2.5"/>
  <text x="580" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#dc2626">🍍 useAuthStore</text>
  <line x1="490" y1="160" x2="670" y2="160" stroke="#fca5a5"/>
  <text x="490" y="183" font-size="11" fill="#35495e" font-family="Consolas, monospace">state:   token, user</text>
  <text x="490" y="207" font-size="11" fill="#35495e" font-family="Consolas, monospace">getters: isLoggedIn</text>
  <text x="490" y="231" font-size="11" fill="#35495e" font-family="Consolas, monospace">actions: login()/logout()</text>

  <!-- components -->
  <rect x="70" y="55" width="150" height="40" rx="8" fill="#ffffff" stroke="#42b883" stroke-width="2"/>
  <text x="145" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#35495e">UsersPage.vue</text>
  <rect x="250" y="55" width="150" height="40" rx="8" fill="#ffffff" stroke="#42b883" stroke-width="2"/>
  <text x="325" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#35495e">UserDetail.vue</text>
  <rect x="490" y="55" width="150" height="40" rx="8" fill="#ffffff" stroke="#42b883" stroke-width="2"/>
  <text x="565" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#35495e">LoginPage.vue</text>

  <path d="M 145 95 L 165 115" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#a9y)"/>
  <path d="M 300 95 L 230 115" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#a9y)"/>
  <path d="M 565 95 L 570 115" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#a9y)"/>

  <!-- API + localStorage -->
  <ellipse cx="180" cy="315" rx="18" ry="7" fill="#cbd5e1"/>
  <rect x="162" y="315" width="36" height="32" fill="#cbd5e1"/>
  <ellipse cx="180" cy="347" rx="18" ry="7" fill="#94a3b8"/>
  <text x="180" y="375" text-anchor="middle" font-size="11" fill="#64748b">REST API</text>
  <path d="M 180 305 L 180 265" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 3" fill="none" marker-end="url(#a9)"/>
  <text x="235" y="295" font-size="10" fill="#64748b">fetch di dalam action</text>

  <rect x="500" y="300 " width="160" height="60" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="580" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#35495e">💾 localStorage</text>
  <text x="580" y="345" text-anchor="middle" font-size="10" fill="#64748b">token bertahan setelah refresh</text>
  <path d="M 580 295 L 580 265" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 3" fill="none" marker-end="url(#a9)"/>

  <!-- guard link -->
  <rect x="330" y="300" width="130" height="60" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="395" y="325" text-anchor="middle" font-size="11" font-weight="bold" fill="#b45309">router guard</text>
  <text x="395" y="343" text-anchor="middle" font-size="10" fill="#b45309">cek isLoggedIn</text>
  <path d="M 470 230 L 420 295" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#a9y)"/>

  <text x="380" y="410" text-anchor="middle" font-size="11" fill="#64748b">Hati-hati: destructuring store menghilangkan reactivity → pakai storeToRefs()</text>
</svg>
